server.port=8082
spring.application.name=chat-client

# ali百炼
spring.ai.dashscope.api-key=${ALI_AI_KEY}
# 模型名称
spring.ai.dashscope.chat.options.model=qwen-plus


# deepseek
spring.ai.deepseek.api-key=${DEEP_SEEK_KEY}
spring.ai.deepseek.chat.options.model=deepseek-chat

# ollama 配置
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen3:4b

# 指定org.springframework.ai.chat.client.advisor包的日志级别
#logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG

# 记忆持久化配置（mysql）
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=classpath:/data/sql/schema-mysql.sql

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://192.168.1.117:33060/springai?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root

# 记忆持久化配置（redis）
spring.ai.memory.redis.host=192.168.1.117
spring.ai.memory.redis.port=6379
spring.ai.memory.redis.password=root
spring.ai.memory.redis.timeout=5000
